<!DOCTYPE html>
<html lang="en" data-theme="light" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Chat App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
  <div class="top-bar">
    <div class="top-controls">
      <div class="model-selector">
        <div class="metrics-option" onclick="toggleMetricsMenu()">
          <i class="bi bi-graph-up"></i>
          <span class="current-metrics">Metrics</span>
          <i class="bi bi-chevron-down"></i>
        </div>
        <div class="metrics-menu">
          <div class="metrics-menu-item" onclick="selectMetrics('grafana')">
            <i class="bi bi-graph-up"></i>
            Grafana
          </div>
          <div class="metrics-menu-item" onclick="selectMetrics('datadog')">
            <i class="bi bi-bar-chart"></i>
            DataDog
          </div>
          <div class="metrics-menu-item" onclick="selectMetrics('cloudwatch')">
            <i class="bi bi-cloud"></i>
            CloudWatch
          </div>
          <div class="metrics-menu-item" onclick="selectMetrics('splunk')">
            <i class="bi bi-search"></i>
            Splunk
          </div>
          <div class="metrics-menu-item" onclick="selectMetrics('kibana')">
            <i class="bi bi-diagram-3"></i>
            Kibana
          </div>
          <div class="metrics-menu-divider"></div>
          <div class="metrics-menu-item" onclick="toggleGrafana()">
            <i class="bi bi-arrows-angle-expand"></i>
            Show/Hide Metrics
          </div>
        </div>
      </div>
      <div class="model-selector">
        <div class="model-option" onclick="toggleModelMenu()">
          <i class="bi bi-cpu"></i>
          <span class="current-model">OpenAI</span>
          <i class="bi bi-chevron-down"></i>
        </div>
        <div class="model-menu">
          <div class="model-menu-item" onclick="selectModel('openai')">
            <i class="bi bi-stars"></i>
            OpenAI
          </div>
          <div class="model-menu-item" onclick="selectModel('anthropic')">
            <i class="bi bi-robot"></i>
            Anthropic
          </div>
          <div class="model-menu-item" onclick="selectModel('deepseek')">
            <i class="bi bi-search"></i>
            DeepSeek
          </div>
          <div class="model-menu-item" onclick="selectModel('ollama')">
            <i class="bi bi-laptop"></i>
            Ollama (Local)
          </div>
        </div>
      </div>
      <div class="theme-toggle">
        <div class="theme-toggle-option light" onclick="toggleTheme()">
          <i class="bi bi-sun"></i>
          Light
        </div>
        <div class="theme-toggle-option dark" onclick="toggleTheme()">
          <i class="bi bi-moon"></i>
          Dark
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex">
    <div class="sidebar">
      <div class="sidebar-content">
        <button id="new-chat" class="btn btn-primary w-100 mb-3">
          <i class="bi bi-plus-lg"></i>
          New Chat
        </button>
        <div id="chat-history"></div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="content-container">
        <div class="export-button" onclick="toggleExportMenu()">
          <i class="bi bi-download"></i>
          <span>Export</span>
          <i class="bi bi-chevron-down"></i>
          <div class="export-menu">
            <div class="export-menu-item" onclick="exportChat('pdf')">
              <i class="bi bi-file-pdf"></i>
              Export as PDF
            </div>
            <div class="export-menu-item" onclick="exportChat('txt')">
              <i class="bi bi-file-text"></i>
              Export as TXT
            </div>
          </div>
        </div>
        <div class="app-header">
          <h1>Chat App</h1>
          <p>Ask me anything about observability...</p>
        </div>
        <div id="conversation"></div>
        <div class="d-flex justify-content-center mb-3">
          <div id="spinner"></div>
        </div>
      </div>
      <div class="grafana-container">
        <iframe id="grafana-iframe" src="http://localhost:3000/d/pMEd7m0Mz/cadvisor-exporter?orgId=1&from=now-6h&to=now&timezone=browser&var-host=$__all&var-container=$__all&refresh=5s"></iframe>
      </div>
    </div>
  </div>

  <div class="input-container">
    <form method="post">
      <div class="d-flex gap-2">
        <input id="prompt-input" name="prompt" class="form-control" placeholder="Type your message..."/>
        <button class="btn btn-primary">Send</button>
      </div>
    </form>
    <div id="error" class="d-none text-danger mt-2">
      Error occurred, check the browser developer console for more information.
    </div>
  </div>

  <script>
    let activeMenu = null;
    let mouseTrackingInterval = null;

    function getDistance(x1, y1, x2, y2) {
      return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
    }

    function trackMouseDistance(e) {
      if (!activeMenu) return;

      const menuContainer = activeMenu.closest('.model-selector, .export-button');
      if (!menuContainer) return;

      const menuRect = activeMenu.getBoundingClientRect();
      const containerRect = menuContainer.getBoundingClientRect();
      
      // Вычисляем центр области, включающей и контейнер, и меню
      const centerX = (menuRect.left + menuRect.right + containerRect.left + containerRect.right) / 4;
      const centerY = (menuRect.top + menuRect.bottom + containerRect.top + containerRect.bottom) / 4;
      
      const distance = getDistance(e.clientX, e.clientY, centerX, centerY);
      
      if (distance > 200) {
        closeAllMenus();
      }
    }

    function closeAllMenus() {
      const menus = document.querySelectorAll('.model-menu, .metrics-menu, .export-menu, .chat-menu');
      menus.forEach(menu => menu.classList.remove('show'));
      activeMenu = null;
      
      if (mouseTrackingInterval) {
        document.removeEventListener('mousemove', trackMouseDistance);
        mouseTrackingInterval = null;
      }
    }

    function setupMenuTracking(menu) {
      activeMenu = menu;
      
      if (!mouseTrackingInterval) {
        document.addEventListener('mousemove', trackMouseDistance);
        mouseTrackingInterval = true;
      }
    }

    // Обновляем обработчик для chat-menu-button
    function toggleChatMenu(event, button) {
      if (event) {
        event.stopPropagation();
      }
      
      // Находим ближайшее меню к кнопке
      const menu = button.nextElementSibling;
      const wasActive = menu.classList.contains('show');
      
      closeAllMenus();
      
      if (!wasActive) {
        menu.classList.add('show');
        setupMenuTracking(menu);
      }
    }

    // Обновляем HTML для chat-menu-button
    document.addEventListener('DOMContentLoaded', function() {
      // Обновляем все chat-menu-button
      const chatMenuButtons = document.querySelectorAll('.chat-menu-button');
      chatMenuButtons.forEach(button => {
        button.setAttribute('onclick', 'toggleChatMenu(event, this)');
      });

      // Добавляем обработчики для предотвращения закрытия при клике внутри меню
      const allMenus = document.querySelectorAll('.model-menu, .metrics-menu, .export-menu, .chat-menu');
      allMenus.forEach(menu => {
        menu.addEventListener('click', (e) => e.stopPropagation());
      });

      // Добавляем обработчик для закрытия меню при клике вне их
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.model-selector') && 
            !e.target.closest('.metrics-menu') && 
            !e.target.closest('.export-button') && 
            !e.target.closest('.chat-menu-button')) {
          closeAllMenus();
        }
      });
    });

    // Обновляем остальные функции toggle
    function toggleModelMenu(event) {
      if (event) {
        event.stopPropagation();
      }
      const menuContainer = document.querySelectorAll('.model-selector')[1]; // Берем второй .model-selector
      const menu = menuContainer.querySelector('.model-menu');
      const wasActive = menu.classList.contains('show');
      
      closeAllMenus();
      
      if (!wasActive) {
        menu.classList.add('show');
        setupMenuTracking(menu);
      }
    }

    function toggleMetricsMenu(event) {
      if (event) {
        event.stopPropagation();
      }
      const menuContainer = document.querySelectorAll('.model-selector')[0]; // Берем первый .model-selector
      const menu = menuContainer.querySelector('.metrics-menu');
      const wasActive = menu.classList.contains('show');
      
      closeAllMenus();
      
      if (!wasActive) {
        menu.classList.add('show');
        setupMenuTracking(menu);
      }
    }

    function toggleExportMenu(event) {
      if (event) {
        event.stopPropagation();
      }
      const menuContainer = document.querySelector('.export-button');
      const menu = menuContainer.querySelector('.export-menu');
      const wasActive = menu.classList.contains('show');
      
      closeAllMenus();
      
      if (!wasActive) {
        menu.classList.add('show');
        setupMenuTracking(menu);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const menus = document.querySelectorAll('.model-menu, .metrics-menu, .export-menu');
      menus.forEach(menu => {
        menu.addEventListener('click', (e) => e.stopPropagation());
      });
    });

    function selectModel(type) {
      const currentModel = document.querySelector('.current-model');
      currentModel.textContent = type.charAt(0).toUpperCase() + type.slice(1);
      closeAllMenus();
    }

    function selectMetrics(type) {
      const currentMetrics = document.querySelector('.current-metrics');
      currentMetrics.textContent = type.charAt(0).toUpperCase() + type.slice(1);
      closeAllMenus();
      
      if (!document.querySelector('.grafana-container').classList.contains('show')) {
        toggleGrafana();
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-theme', newTheme);
      
      // Update Grafana iframe theme
      const grafanaIframe = document.getElementById('grafana-iframe');
      const currentSrc = new URL(grafanaIframe.src);
      currentSrc.searchParams.set('theme', newTheme);
      grafanaIframe.src = currentSrc.toString();
      
      // Save theme preference
      localStorage.setItem('theme', newTheme);
    }

    // Load saved theme preference and set initial Grafana theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    // Set initial Grafana theme
    const grafanaIframe = document.getElementById('grafana-iframe');
    const currentSrc = new URL(grafanaIframe.src);
    currentSrc.searchParams.set('theme', savedTheme);
    grafanaIframe.src = currentSrc.toString();

    function toggleGrafana() {
      const container = document.querySelector('.grafana-container');
      const content = document.querySelector('.content-container');
      const inputForm = document.querySelector('.input-container form');
      
      container.classList.toggle('show');
      content.classList.toggle('hide');
      inputForm.classList.toggle('hide');

      // Reset metrics name when hiding the container
      if (!container.classList.contains('show')) {
        resetMetricsName();
      }
    }

    // Add click handlers for chat history and new chat
    document.addEventListener('DOMContentLoaded', function() {
      // Handle chat history clicks
      document.getElementById('chat-history').addEventListener('click', function(e) {
        const chatItem = e.target.closest('.chat-history-item');
        if (chatItem) {
          const container = document.querySelector('.grafana-container');
          if (container.classList.contains('show')) {
            toggleGrafana();
          }
        }
      });

      // Handle new chat button
      document.getElementById('new-chat').addEventListener('click', function() {
        const container = document.querySelector('.grafana-container');
        if (container.classList.contains('show')) {
          toggleGrafana();
        }
      });
    });

    // Add function to reset metrics name to default
    function resetMetricsName() {
      const currentMetrics = document.querySelector('.current-metrics');
      currentMetrics.textContent = 'Metrics';
    }

    function exportChat(format) {
      const conversation = document.getElementById('conversation');
      let content = '';
      const messages = [];
      
      // Собираем сообщения в структурированном формате
      conversation.childNodes.forEach(node => {
        if (node.classList && (node.classList.contains('user') || node.classList.contains('model'))) {
          messages.push({
            role: node.classList.contains('user') ? 'user' : 'ai',
            content: node.textContent.trim()
          });
        }
      });

      if (format === 'txt') {
        // Форматируем текст для TXT
        messages.forEach(msg => {
          const role = msg.role === 'user' ? 'You asked:' : 'AI Response:';
          content += `${role}\n${msg.content}\n\n`;
        });
        
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'chat_history.txt';
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
      } else if (format === 'pdf') {
        // Загружаем необходимые библиотеки для PDF
        Promise.all([
          new Promise(resolve => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = resolve;
            document.head.appendChild(script);
          }),
          new Promise(resolve => {
            const link = document.createElement('link');
            link.href = 'https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap';
            link.rel = 'stylesheet';
            link.onload = resolve;
            document.head.appendChild(link);
          })
        ]).then(() => {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({
            orientation: 'p',
            unit: 'mm',
            format: 'a4',
            putOnlyUsedFonts: true
          });

          // Настройки страницы
          const pageWidth = doc.internal.pageSize.getWidth();
          const margin = 20;
          const contentWidth = pageWidth - 2 * margin;
          let y = margin;

          // Добавляем заголовок
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(16);
          doc.text('Chat History', margin, y);
          y += 10;

          // Добавляем время экспорта
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);
          const date = new Date().toLocaleString();
          doc.text(`Exported on: ${date}`, margin, y);
          y += 15;

          // Функция для добавления нового блока сообщения
          function addMessageBlock(role, content) {
            // Добавляем новую страницу если не хватает места
            if (y > doc.internal.pageSize.getHeight() - margin) {
              doc.addPage();
              y = margin;
            }

            // Заголовок сообщения
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(12);
            doc.setTextColor(role === 'user' ? '#1a73e8' : '#188038');
            doc.text(role === 'user' ? 'You asked:' : 'AI Response:', margin, y);
            y += 7;

            // Содержимое сообщения
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);

            // Разбиваем текст на строки с учетом ширины страницы
            const lines = doc.splitTextToSize(content, contentWidth);
            
            // Проверяем, поместится ли весь текст на текущей странице
            if (y + lines.length * 5.5 > doc.internal.pageSize.getHeight() - margin) {
              doc.addPage();
              y = margin;
            }

            // Добавляем текст
            doc.text(lines, margin, y);
            y += lines.length * 5.5 + 10;

            // Добавляем разделительную линию
            if (y < doc.internal.pageSize.getHeight() - margin) {
              doc.setDrawColor(200, 200, 200);
              doc.line(margin, y - 5, pageWidth - margin, y - 5);
            }
          }

          // Добавляем все сообщения
          messages.forEach(msg => {
            addMessageBlock(msg.role, msg.content);
          });

          // Сохраняем PDF
          doc.save('chat_history.pdf');
        });
      }
      
      // Закрываем меню
      const menu = document.querySelector('.export-menu');
      menu.classList.remove('show');
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.6.3/typescript.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module">
    async function loadTs() {
      const response = await fetch('/chat_app.ts');
      const tsCode = await response.text();
      const jsCode = window.ts.transpile(tsCode, { target: "es2015" });
      let script = document.createElement('script');
      script.type = 'module';
      script.text = jsCode;
      document.body.appendChild(script);
    }

    loadTs().catch((e) => {
      console.error(e);
      document.getElementById('error').classList.remove('d-none');
      document.getElementById('spinner').classList.remove('active');
    });
  </script>
</body>
</html>
