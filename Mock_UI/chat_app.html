<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root[data-theme="light"] {
      --bg-main: #ffffff;
      --bg-sidebar: #f8f9fa;
      --bg-user-message: rgba(247, 247, 248, 0.7);
      --bg-ai-message: rgba(255, 255, 255, 0.7);
      --text-color: #000000;
      --border-color: #e5e5e5;
      --hover-color: #e9ecef;
    }

    :root[data-theme="dark"] {
      --bg-main: #1a1a1a;
      --bg-sidebar: #2d2d2d;
      --bg-user-message: rgba(52, 53, 65, 0.3);
      --bg-ai-message: rgba(68, 70, 84, 0.3);
      --text-color: #ffffff;
      --border-color: #4a4a4a;
      --hover-color: #3a3a3a;
    }

    body {
      overflow-x: hidden;
      background-color: var(--bg-main);
      color: var(--text-color);
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1001;
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      padding: 4px;
      border-radius: 30px;
      display: flex;
      gap: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .theme-toggle-option {
      padding: 6px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-color);
      font-size: 0.875rem;
      transition: background-color 0.3s;
    }

    [data-theme="light"] .theme-toggle-option.light {
      background-color: var(--hover-color);
    }

    [data-theme="dark"] .theme-toggle-option.dark {
      background-color: var(--hover-color);
    }

    .theme-toggle-option i {
      font-size: 1rem;
    }

    .sidebar {
      position: fixed;
      width: 260px;
      height: 100vh;
      border-right: 1px solid var(--border-color);
      background: var(--bg-sidebar);
      z-index: 1000;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .main-content {
      margin-left: 260px;
      width: calc(100% - 260px);
      display: flex;
      justify-content: center;
      padding-bottom: 100px;
    }

    .content-container {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      margin: 0 auto;
    }

    .chat-history-item {
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.375rem;
      color: var(--text-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .chat-history-item:hover {
      background: var(--hover-color);
    }

    .chat-history-item.active {
      background: var(--hover-color);
    }

    .chat-history-item .title {
      flex-grow: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 0.5rem;
    }

    .chat-menu-button {
      padding: 0.25rem;
      border-radius: 0.25rem;
      border: none;
      background: none;
      color: var(--text-color);
      opacity: 0.6;
      cursor: pointer;
      display: flex;
      align-items: center;
      z-index: 2;
    }

    .chat-menu-button:hover {
      opacity: 1;
      background: var(--hover-color);
    }

    .chat-menu {
      position: absolute;
      right: 0;
      top: calc(100% - 5px);
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      padding: 0.25rem;
      min-width: 120px;
      z-index: 1000;
      display: none;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .chat-menu.show {
      display: block;
    }

    .chat-menu-item {
      padding: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-color);
      cursor: pointer;
      border-radius: 0.25rem;
      white-space: nowrap;
    }

    .chat-menu-item:hover {
      background: var(--hover-color);
    }

    .chat-menu-item.delete {
      color: #dc3545;
    }

    .chat-menu-item i {
      font-size: 0.875rem;
    }

    .input-container {
      position: fixed;
      bottom: 0;
      right: 0;
      left: 260px;
      background: var(--bg-main);
      padding: 20px;
      border-top: 1px solid var(--border-color);
      z-index: 1000;
      display: flex;
      justify-content: center;
    }

    .input-container form {
      width: 100%;
      max-width: 800px;
    }

    #prompt-input {
      background-color: var(--bg-main);
      color: var(--text-color);
      border-color: var(--border-color);
    }

    #prompt-input::placeholder {
      color: var(--text-color);
      opacity: 0.6;
    }

    #conversation {
      margin-bottom: 20px;
    }

    #conversation .user::before {
      content: 'You asked: ';
      font-weight: bold;
      display: block;
      color: var(--text-color);
      opacity: 0.7;
      font-size: 0.875rem;
    }

    #conversation .model::before {
      content: 'AI Response: ';
      font-weight: bold;
      display: block;
      color: var(--text-color);
      opacity: 0.7;
      font-size: 0.875rem;
    }

    #conversation .user,
    #conversation .model {
      padding: 1.5rem;
      margin: 0.5rem 0;
      border-radius: 0.375rem;
    }

    #conversation > div {
      border: none !important;
    }

    #conversation .user {
      background: var(--bg-user-message);
    }

    #conversation .model {
      background: var(--bg-ai-message);
    }

    #spinner {
      opacity: 0;
      transition: opacity 500ms ease-in;
      width: 30px;
      height: 30px;
      border: 3px solid var(--text-color);
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #spinner.active {
      opacity: 1;
    }

    .app-header {
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <div class="theme-toggle-option light">
      <i class="bi bi-sun-fill"></i>
      Light
    </div>
    <div class="theme-toggle-option dark">
      <i class="bi bi-moon-fill"></i>
      Dark
    </div>
  </div>

  <div class="d-flex">
    <div class="sidebar p-3">
      <button id="new-chat" class="btn btn-primary w-100 mb-3">New Chat</button>
      <div id="chat-history" class="d-flex flex-column gap-2">
        <!-- Chat history will be populated here -->
      </div>
    </div>
    
    <div class="main-content">
      <div class="content-container">
        <div class="app-header">
          <h1>Chat App</h1>
          <p>Ask me anything...</p>
        </div>
        <div id="conversation"></div>
        <div class="d-flex justify-content-center mb-3">
          <div id="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-container">
    <form method="post">
      <div class="d-flex gap-2">
        <input id="prompt-input" name="prompt" class="form-control" placeholder="Type your message..."/>
        <button class="btn btn-primary">Send</button>
      </div>
    </form>
    <div id="error" class="d-none text-danger mt-2">
      Error occurred, check the browser developer console for more information.
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-theme', newTheme);
      
      // Save theme preference
      localStorage.setItem('theme', newTheme);
    }

    // Load saved theme preference
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.6.3/typescript.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module">
    async function loadTs() {
      const response = await fetch('/chat_app.ts');
      const tsCode = await response.text();
      const jsCode = window.ts.transpile(tsCode, { target: "es2015" });
      let script = document.createElement('script');
      script.type = 'module';
      script.text = jsCode;
      document.body.appendChild(script);
    }

    loadTs().catch((e) => {
      console.error(e);
      document.getElementById('error').classList.remove('d-none');
      document.getElementById('spinner').classList.remove('active');
    });
  </script>
</body>
</html>
